name: Update Matches JSON

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Packages
        run: |
          pip install requests beautifulsoup4 pandas

      - name: Run Scraper
        run: |
          python Match_details.py

      - name: Commit Updated matches.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add matches.json
          git commit -m "Auto update matches.json" || echo "No changes"
          git push
