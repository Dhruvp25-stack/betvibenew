name: Update Matches JSON

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-matches
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install playwright

      - name: Install Playwright Browser
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run Scraper
        run: |
          xvfb-run --auto-servernum python Match_details.py

      - name: Rename Output File
        run: |
          if [ -f matches_clean.json ]; then
            mv matches_clean.json matches.json
          fi

      - name: Commit Updated matches.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add matches.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto update matches.json"
          git push
